# ============================================================
# wacrm-free — full local/self-host stack, one command.
#
#   cp .env.local.example .env      # fill in Supabase + secrets
#   docker compose up -d --build
#
# Brings up:
#   • app              — the CRM (Next.js) on http://localhost:3000
#   • evolution-api    — the free WhatsApp gateway on http://localhost:8088
#   • evolution-postgres / evolution-redis — Evolution's own storage
#
# The app and Evolution share a network, so they reach each other by
# service name — no host.docker.internal needed. Supabase is external
# (create a free project and put the keys in .env).
#
# Variable substitution (${VAR}) below is read from the root .env file;
# the app's runtime environment is loaded from the same .env via env_file.
# ============================================================

name: wacrm-free

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at build time (see Dockerfile).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: wacrm_free_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Inside the compose network the app reaches Evolution by service
      # name, and Evolution reaches the app back the same way — these
      # override the localhost/dev values in .env.
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_WEBHOOK_URL: http://app:3000/api/whatsapp/webhook
    depends_on:
      - evolution-api
    networks:
      - wacrm-net

  evolution-api:
    # Built from our own Evolution source checkout (../evolution-api, pinned
    # to 2.3.7) so every patch is a normal, code-level TypeScript edit rather
    # than post-build surgery on the minified bundle. Patches live in that
    # repo's src/ and include: forwarding message-receipt.update (status-view
    # "seen by", incl. the viewer's jid) and pin/mute/star chat endpoints.
    # Rebuild after editing the source: docker compose up -d --build evolution-api
    build:
      context: ../evolution-api
      dockerfile: Dockerfile
    image: wacrm-evolution-api:patched
    container_name: wacrm_evolution_api
    restart: unless-stopped
    depends_on:
      - evolution-redis
      - evolution-postgres
    ports:
      # Bound to localhost only — the API is reachable at :8088 for the
      # built-in manager UI (/manager) and curl, not the public internet.
      - "127.0.0.1:8088:8080"
    volumes:
      - evolution_instances:/evolution/instances
    # Config inlined here so the full-stack compose is self-contained (no
    # separate env file to copy). Only the gateway key comes from the root
    # .env — set EVOLUTION_API_KEY once; the app sends the same value.
    environment:
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      SERVER_URL: http://localhost:8088
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      TELEMETRY_ENABLED: "false"
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      DEL_INSTANCE: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USERNAME:-evolution}:${POSTGRES_PASSWORD:-evolution}@evolution-postgres:5432/${POSTGRES_DATABASE:-evolution}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: wacrm-free
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: "30"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
    networks:
      - wacrm-net

  evolution-postgres:
    image: postgres:15-alpine
    container_name: wacrm_evolution_postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=1000
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE:-evolution}
      - POSTGRES_USER=${POSTGRES_USERNAME:-evolution}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - wacrm-net

  evolution-redis:
    image: redis:7-alpine
    container_name: wacrm_evolution_redis
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - wacrm-net

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

networks:
  wacrm-net:
    name: wacrm-free-net
    driver: bridge
